# no beep
blacklist pcspkr
blacklist snd_pcsp

# blacklist suppresses alias/autoload; install /bin/false blocks explicit modprobe.

# Intel TCO Watchdog/Timer module
blacklist iTCO_wdt
install iTCO_wdt /bin/false

# AMD SP5100 TCO Watchdog/Timer module (required for Ryzen CPUs)
blacklist sp5100_tco
install sp5100_tco /bin/false

# others
blacklist iTCO_vendor_support
install iTCO_vendor_support /bin/false

blacklist intel_pmc_bxt
install intel_pmc_bxt /bin/false

blacklist wdat_wdt
install wdat_wdt /bin/false
