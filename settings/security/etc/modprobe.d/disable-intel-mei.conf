# Intel Management Engine Interface (AMT/vPro remote-management path).
# blacklist suppresses alias/autoload; install /bin/false blocks explicit modprobe.
blacklist mei
install mei /bin/false

blacklist mei_me
install mei_me /bin/false

blacklist mei_hdcp
install mei_hdcp /bin/false

blacklist mei_pxp
install mei_pxp /bin/false
